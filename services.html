    <style>
        :root{
            --bg:     #06101e;
            --bg2:    #0b1929;
            --card:   rgba(255,255,255,0.04);
            --hover:  rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --bord2:  rgba(245,158,11,0.28);
            --text:   #dce6f5;
            --muted:  #5c7494;
            --inp:    rgba(255,255,255,0.05);
            --amber:  #f59e0b;
            --amber2: #fbbf24;
            --cyan:   #22d3ee;
            --red:    #ef4444;
            --green:  #22c55e;
            --blue:   #3b82f6;
            --wa:     #25D366;
            --r:      14px;
            --rl:     22px;
        }
        body.light{
            --bg:    #eef3fb;
            --bg2:   #e2eaf8;
            --card:  rgba(255,255,255,0.82);
            --hover: rgba(255,255,255,0.96);
            --border:rgba(37,99,235,0.1);
            --bord2: rgba(245,158,11,0.35);
            --text:  #1a2a42;
            --muted: #5b7395;
            --inp:   rgba(255,255,255,0.9);
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{
            font-family:'Outfit',sans-serif;
            background:var(--bg);color:var(--text);
            overflow-x:hidden;transition:background .4s,color .4s;
            padding-bottom:50px;
        }
        body::before{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background-image:radial-gradient(circle,rgba(245,158,11,.055) 1px,transparent 1px);
            background-size:30px 30px;
        }
        body.light::before{
            background-image:radial-gradient(circle,rgba(37,99,235,.05) 1px,transparent 1px);
        }
        body::after{
            content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);
            width:60vw;height:260px;pointer-events:none;z-index:0;
            background:radial-gradient(ellipse,rgba(245,158,11,.07) 0%,transparent 70%);
        }

        /* ─── HEADER ─── */
        header{
            position:sticky;top:0;z-index:1000;
            background:rgba(6,16,30,.9);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
        }
        body.light header{background:rgba(238,243,251,.92);}
        header::after{
            content:'';display:block;height:2px;
            background:linear-gradient(90deg,transparent,var(--amber),var(--cyan),var(--amber),transparent);
            background-size:250% 100%;animation:shimmer 4s linear infinite;
        }
        @keyframes shimmer{0%{background-position:-250% 0}100%{background-position:250% 0}}
        .nav-container{
            display:flex;justify-content:space-between;align-items:center;
            padding:13px 22px;max-width:1100px;margin:0 auto;
        }
        .logo{
            font-size:1.2rem;font-weight:900;text-decoration:none;
            color:var(--amber);letter-spacing:-.02em;
            text-shadow:0 0 28px rgba(245,158,11,.4);
            animation:slideIn .7s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
        .lang-nav{display:flex;gap:7px;align-items:center;}
        .lang-btn{
            background:var(--card);border:1px solid var(--border);
            padding:5px 11px;font-size:.74rem;font-weight:700;
            cursor:pointer;border-radius:8px;transition:.22s;
            color:var(--muted);font-family:'Outfit',sans-serif;
        }
        .lang-btn:hover{border-color:var(--amber);color:var(--amber);}
        .lang-btn.active{background:var(--amber);color:#000;border-color:transparent;font-weight:800;}
        .dark-toggle{
            background:var(--card);border:1px solid var(--border);
            border-radius:50%;width:35px;height:35px;cursor:pointer;
            font-size:.9rem;display:flex;align-items:center;justify-content:center;
            transition:.22s;color:var(--text);
        }
        .dark-toggle:hover{border-color:var(--amber);}

        /* ─── MAIN CONTAINER ─── */
        .container{
            position:relative;z-index:1;
            max-width:980px;margin:28px auto;padding:0 16px;
        }

        /* Back nav */
        .back-nav{
            display:inline-flex;align-items:center;gap:8px;text-decoration:none;
            color:var(--muted);font-weight:700;font-size:.87rem;
            background:var(--card);border:1px solid var(--border);
            padding:8px 14px;border-radius:10px;margin-bottom:20px;
            transition:.22s;backdrop-filter:blur(8px);
        }
        .back-nav:hover{color:var(--amber);border-color:var(--bord2);transform:translateX(-3px);}

        /* ─── TABS ─── */
        .tabs{display:flex;gap:9px;margin-bottom:20px;justify-content:center;}
        .tab-btn{
            padding:11px 24px;border:1px solid var(--border);border-radius:50px;
            font-weight:700;font-size:.9rem;cursor:pointer;
            background:var(--card);color:var(--muted);
            transition:.25s;backdrop-filter:blur(8px);font-family:'Outfit',sans-serif;
        }
        .tab-btn:hover{border-color:var(--bord2);color:var(--amber);}
        .tab-btn.active{
            background:var(--amber);color:#000;
            border-color:transparent;font-weight:800;
            box-shadow:0 5px 18px rgba(245,158,11,.3);
        }

        /* ─── CALC CARD ─── */
        .calc-card{
            display:none;
            background:var(--card);
            backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
            border:1px solid var(--border);border-radius:var(--rl);
            padding:28px;
            box-shadow:0 22px 55px rgba(0,0,0,.35);
            transition:background .3s;
        }
        .calc-card.active{display:block;animation:fadeIn .35s ease both;}
        body.light .calc-card{background:rgba(255,255,255,.85);}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        .calc-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:26px;}
        @media(max-width:820px){.calc-grid{grid-template-columns:1fr;}}

        /* Labels */
        label{
            display:block;margin-bottom:7px;margin-top:14px;
            font-weight:700;font-size:.87rem;color:var(--amber);
        }
        body.light label{color:var(--blue);}

        /* Type toggle */
        .type-toggle{display:flex;gap:8px;margin-bottom:14px;}
        .type-btn{
            flex:1;padding:10px 8px;border:1px solid var(--border);border-radius:10px;
            cursor:pointer;font-weight:700;font-size:.84rem;
            background:var(--card);color:var(--muted);
            transition:.22s;font-family:'Outfit',sans-serif;
        }
        .type-btn:hover{border-color:var(--bord2);color:var(--amber);}
        .type-btn.active{
            background:rgba(245,158,11,.15);color:var(--amber);
            border-color:var(--amber);
        }
        body.light .type-btn.active{background:rgba(37,99,235,.1);color:var(--blue);border-color:var(--blue);}

        /* Custom select */
        .custom-select{position:relative;margin-bottom:14px;}
        .cs-trigger{
            width:100%;padding:13px 40px 13px 13px;
            border:1px solid var(--border);border-radius:var(--r);
            font-size:.95rem;font-family:'Outfit',sans-serif;
            background:var(--inp);color:var(--text);cursor:pointer;
            text-align:left;font-weight:600;
            transition:border .22s,box-shadow .22s;
            display:flex;justify-content:space-between;align-items:center;
        }
        .cs-trigger:focus,.cs-trigger.open{
            border-color:var(--amber);
            box-shadow:0 0 0 3px rgba(245,158,11,.12);outline:none;
        }
        .cs-trigger .arrow{font-size:.68rem;color:var(--amber);transition:transform .22s;flex-shrink:0;margin-left:7px;}
        .cs-trigger.open .arrow{transform:rotate(180deg);}
        .cs-panel{
            display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;
            background:var(--bg2);border:1px solid var(--bord2);
            border-radius:var(--r);
            box-shadow:0 14px 36px rgba(0,0,0,.35);
            overflow:hidden;animation:drop .2s ease;
        }
        body.light .cs-panel{background:rgba(255,255,255,.97);box-shadow:0 14px 36px rgba(37,99,235,.12);}
        .cs-panel.open{display:block;}
        @keyframes drop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
        .cs-search{
            width:100%;padding:9px 13px;border:none;
            border-bottom:1px solid var(--border);
            font-size:.88rem;font-family:'Outfit',sans-serif;
            background:rgba(245,158,11,.05);color:var(--text);outline:none;
        }
        body.light .cs-search{background:rgba(37,99,235,.04);}
        .cs-list{max-height:210px;overflow-y:auto;}
        .cs-list::-webkit-scrollbar{width:4px;}
        .cs-list::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px;}
        .cs-option{
            padding:10px 13px;cursor:pointer;font-size:.9rem;font-weight:600;
            color:var(--text);transition:background .14s;
            display:flex;justify-content:space-between;align-items:center;
        }
        .cs-option:hover{background:rgba(245,158,11,.08);}
        .cs-option.selected{background:rgba(245,158,11,.1);color:var(--amber);}
        body.light .cs-option.selected{color:var(--blue);background:rgba(37,99,235,.08);}
        .cs-option .cs-price{font-size:.78rem;font-family:'Space Mono',monospace;color:var(--amber);}
        body.light .cs-option .cs-price{color:var(--blue);}
        .cs-option .p-green{color:#16a34a;background:rgba(22,163,74,.15);padding:2px 7px;border-radius:6px;font-size:.76rem;}
        .cs-option .p-orange{color:#d97706;background:rgba(217,119,6,.15);padding:2px 7px;border-radius:6px;font-size:.76rem;}
        .cs-option .p-red{color:#dc2626;background:rgba(220,38,38,.15);padding:2px 7px;border-radius:6px;font-size:.76rem;}
        .cs-extra{font-size:.7rem;font-weight:800;margin-left:2px;}
        .cs-empty{padding:13px;text-align:center;color:var(--muted);font-size:.86rem;}

        /* KM input */
        input[type=number]{
            width:100%;padding:13px;
            border:1px solid var(--border);border-radius:var(--r);
            margin-bottom:14px;font-size:.95rem;outline:none;
            background:var(--inp);color:var(--text);font-family:'Outfit',sans-serif;
            transition:border .22s;
        }
        input[type=number]:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.1);}

        /* Result box */
        .res-box{
            background:linear-gradient(145deg,#0a1626 0%,#0f1e36 50%,#0a1f38 100%);
            border:1px solid var(--bord2);
            color:#fff;padding:28px;border-radius:var(--rl);text-align:center;
            display:flex;flex-direction:column;justify-content:center;
            box-shadow:0 10px 28px rgba(0,0,0,.35),inset 0 1px 0 rgba(245,158,11,.08);
            transition:all .3s;
        }
        body.light .res-box{
            background:linear-gradient(145deg,#1e3a6e 0%,#1e40af 50%,#2563eb 100%);
            border-color:rgba(255,255,255,.25);
        }
        .res-label{font-size:.85rem;color:rgba(255,255,255,.6);font-weight:600;margin-bottom:10px;}
        .price-wrap{display:flex;align-items:baseline;justify-content:center;gap:5px;margin:8px 0 18px;}
        .price-display{
            font-size:3.4rem;font-weight:900;color:var(--amber);
            font-family:'Space Mono',monospace;line-height:1;
            transition:transform .2s;
        }
        .price-lari{font-size:1.4rem;font-weight:700;color:var(--amber);opacity:.8;}
        .action-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px;}
        .btn-action{
            padding:14px;border-radius:11px;font-weight:800;text-decoration:none;
            display:flex;align-items:center;justify-content:center;gap:7px;
            font-size:.88rem;border:none;cursor:pointer;color:#fff;
            transition:.22s;font-family:'Outfit',sans-serif;
        }
        .btn-action:hover{filter:brightness(1.1);transform:translateY(-1px);}
        .btn-wa{background:var(--wa);}
        .btn-call{background:var(--red);}

        /* Social float */
        .social-float{position:fixed;right:15px;bottom:88px;display:flex;flex-direction:column;gap:9px;z-index:9999;}
        .sf-btn{
            width:45px;height:45px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:1.15rem;color:#fff;text-decoration:none;
            box-shadow:0 4px 15px rgba(0,0,0,.4);transition:.25s;
        }
        .sf-btn:hover{transform:scale(1.15);}
        .sf-fb{background:#1877f2;}
        .sf-yt{background:#ff0000;}

        @media(max-width:580px){
            .container{padding:0 12px;margin:18px auto;}
            .calc-card{padding:18px 14px;border-radius:18px;}
            .tabs{gap:7px;}
            .tab-btn{padding:10px 16px;font-size:.86rem;flex:1;text-align:center;}
            .type-toggle{gap:7px;}
            .type-btn{padding:10px 7px;font-size:.8rem;}
            .price-display{font-size:2.8rem;}
            .action-btns{gap:7px;}
            .btn-action{padding:12px 7px;font-size:.8rem;}
        }
    </style>
</head>

        let currentLang = 'ka';
        let cityType = 'light';
        let countryType = 'light';

        const translations = {
            ka: {
                logoName:'🚛 ირაკლის ევაკუატორი',
                tabCity:'თბილისის უბნები',tabCountry:'ქალაქგარეთ',
                lblType:'ავტომობილის ტიპი',lblFrom:'გამოძახების მისამართი',lblTo:'საბოლოო დანიშნულება',
                lblDest:'მიმართულება თბილისიდან',lblKm:'შეიყვანეთ მანძილი (კმ)',

        function setLang(l, event) {
            currentLang = l;
            const t = translations[l];
            document.getElementById('site-logo').innerText = t.logoName;
            document.getElementById('tab-city').innerText = t.tabCity;
            document.getElementById('tab-country').innerText = t.tabCountry;
            document.getElementById('lbl-type-1').innerText = t.lblType;
            document.getElementById('lbl-type-2').innerText = t.lblType;
            document.getElementById('lbl-from').innerText = t.lblFrom;
            document.getElementById('lbl-to').innerText = t.lblTo;
            document.getElementById('lbl-dest').innerText = t.lblDest;
            document.getElementById('lbl-km').innerText = t.lblKm;
            document.getElementById('city-light').innerText = t.btnLight;
            document.getElementById('city-heavy').innerText = t.btnHeavy;
            document.getElementById('country-light').innerText = t.btnLight;
            document.getElementById('country-heavy').innerText = t.btnHeavy;
            document.querySelectorAll('.wa-text').forEach(el => el.innerText = t.wa);
            document.querySelectorAll('.call-text').forEach(el => el.innerText = t.call);
            document.getElementById('btn-back').innerText = t.back;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            buildDistrictCS('cs-start', t.districts, null, v => { updateEndCS(); updateFinalPrice(); });
            buildDistrictCS('cs-end', t.districts, null, v => updateFinalPrice());
            buildCityCS('cs-inter', t.cities, t.other);
            const cityLbl = cityType === 'light' ? t.btnLight : t.btnHeavy + ' (+20₾)';
            document.getElementById('cityTypeLabel').innerText = cityLbl;
            const cntryLbl = countryType === 'light' ? t.btnLight + ' — 1.5 ₾/km' : t.btnHeavy + ' — 2.0 ₾/km';
            document.getElementById('countryTypeLabel').innerText = cntryLbl;
            updateFinalPrice();
            calculateCountry();
        }

        const csState = {};

        function buildDistrictCS(id, districts, selectedVal, onChange) {
            const el = document.getElementById(id);
            const list = el.querySelector('.cs-list');
            const labelEl = el.querySelector('.cs-label');
            list.innerHTML = '';
            const startVal = csState[id] ? csState[id].value : (selectedVal || districts[0]);
            csState[id] = csState[id] || { value: startVal, label: startVal, data: null };
            districts.forEach(d => {
                let price = calculateLogicalPrice(csState['cs-start'] ? csState['cs-start'].value : d, d);
                if (cityType === 'heavy') price += 20;
                const opt = document.createElement('div');
                opt.className = 'cs-option' + (d === csState[id].value ? ' selected' : '');
                if (id === 'cs-end') {
                    const base = 60, extra = price - base;
                    let priceHtml;
                    if (extra === 0) priceHtml = `<span class="cs-price p-green">${price}₾</span>`;
                    else if (extra === 10) priceHtml = `<span class="cs-price p-orange">60<span class="cs-extra">+10₾</span></span>`;
                    else priceHtml = `<span class="cs-price p-red">60<span class="cs-extra">+20₾</span></span>`;
                    opt.innerHTML = `<span>${d}</span>${priceHtml}`;
                } else {
                    opt.innerHTML = `<span>${d}</span>`;
                }
                opt.addEventListener('click', () => {
                    csState[id] = { value: d, label: d, data: null };
                    el.querySelector('.cs-label').textContent = d;
                    el.querySelectorAll('.cs-option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    closeCS(id);
                    if(onChange) onChange(d);
                });
                list.appendChild(opt);
            });
            labelEl.textContent = csState[id].value || districts[0];
        }

        function buildCityCS(id, cities, otherLabel) {
            const el = document.getElementById(id);
            const list = el.querySelector('.cs-list');
            const labelEl = el.querySelector('.cs-label');
            list.innerHTML = '';
            const allCities = [...cities, {n: otherLabel, v: 'custom', h: 'custom'}];
            if (!csState[id]) csState[id] = { value: cities[0].v, label: cities[0].n, data: cities[0] };
            allCities.forEach(c => {
                const opt = document.createElement('div');
                opt.className = 'cs-option' + (c.v == csState[id].value ? ' selected' : '');
                const priceTag = c.v !== 'custom' ? `<span class="cs-price">${countryType === 'light' ? c.v : c.h}₾</span>` : '';
                opt.innerHTML = `<span>${c.n}</span>${priceTag}`;
                opt.addEventListener('click', () => {
                    csState[id] = { value: c.v, label: c.n, data: c };
                    el.querySelector('.cs-label').textContent = c.n;
                    el.querySelectorAll('.cs-option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    closeCS(id);
                    calculateCountry();
                });
                list.appendChild(opt);
            });
            labelEl.textContent = csState[id].label;
        }

        function toggleCS(id) {
            const el = document.getElementById(id);
            const panel = el.querySelector('.cs-panel');
            const trigger = el.querySelector('.cs-trigger');
            const isOpen = panel.classList.contains('open');
            document.querySelectorAll('.cs-panel.open').forEach(p => {
                p.classList.remove('open');
                p.closest('.custom-select').querySelector('.cs-trigger').classList.remove('open');
            });
            if (!isOpen) {
                panel.classList.add('open');
                trigger.classList.add('open');
                const search = panel.querySelector('.cs-search');
                if (search) { search.value = ''; filterCS(id, ''); }
                setTimeout(() => {
                    const sel = panel.querySelector('.cs-option.selected');
                    if (sel) sel.scrollIntoView({ block: 'nearest' });
                }, 50);
            }
        }

        function closeCS(id) {
            const el = document.getElementById(id);
            el.querySelector('.cs-panel').classList.remove('open');
            el.querySelector('.cs-trigger').classList.remove('open');
        }

        function filterCS(id, q) {
            const el = document.getElementById(id);
            const opts = el.querySelectorAll('.cs-option');
            const lower = q.toLowerCase();
            let any = false;
            opts.forEach(o => {
                const match = o.textContent.toLowerCase().includes(lower);
                o.style.display = match ? '' : 'none';
                if (match) any = true;
            });
            let empty = el.querySelector('.cs-empty');
            if (!any) {
                if (!empty) { empty = document.createElement('div'); empty.className = 'cs-empty'; empty.textContent = '—'; el.querySelector('.cs-list').appendChild(empty); }
                empty.style.display = '';
            } else if (empty) { empty.style.display = 'none'; }
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('.custom-select')) {
                document.querySelectorAll('.cs-panel.open').forEach(p => {
                    p.classList.remove('open');
                    p.closest('.custom-select').querySelector('.cs-trigger').classList.remove('open');
                });
            }
        });

        function updateEndCS() {
            const t = translations[currentLang];
            buildDistrictCS('cs-end', t.districts, null, () => updateFinalPrice());
        }

        function calculateLogicalPrice(a, b) {
            if (!a || !b || a === b) return 60;
            const inGrp = (dist, grp) => grp.includes(dist);
            const has = (grpA, grpB) => (inGrp(a, grpA) && inGrp(b, grpB)) || (inGrp(b, grpA) && inGrp(a, grpB));
            const zahesi = ["ზაჰესი","ავჭალა","Zahesi","Avchala","Захеси","Авчала"];
            const gldani = ["გლდანი","გლდანის ციხეები","Gldani","Gldani Prisons","Глдани","Тюрьмы Глдани"];
            const mukhiani = ["მუხიანი","თემქა","Mukhiani","Temka","Мухиани","Темка"];
            const sea = ["ზღვის უბანი","ივერთუბანი","მახათას მთა","Sea District","Ivertubani","Makhata Mountain","Тбилисское море","Ивертубани","Махата"];
            const saburtalo_vake = ["საბურთალო","ვაკე","ნუცუბიძე","ბაგები","Saburtalo","Vake","Nutsubidze","Bagebi","Сабуртало","Ваке","Нуцубидзе","Багеби"];
            const didube_eliava = ["დიდუბე","ელიავა","Didube","Eliava","Дидубе","Элиава"];
            const center = ["მარჯანიშვილი","რუსთაველი","მთაწმინდა","ვერა","ვაგზალი","პლეხანოვი","ჩუღურეთი","ნაძალადევი","ნახალოვკა","ლოტკინი","Marjanishvili","Rustaveli","Mtatsminda","Vera","Station Square","Plekhanov","Chughureti","Nadzaladevi","Nakhalovka","Lotkini","Марджанишвили","Руставели","Мтацминда","Вера","Вокзал","Плеханова","Чугурети","Надзаладеви","Нахаловка","Лоткини","Vagzali"];
            const ortachala_isani = ["ორთაჭალა","ისანი","ავლაბარი","კრწანისი","Ortachala","Isani","Avlabari","Krtsanisi","Ортачала","Исани","Авлабари","Крцаниси"];
            const varketili_samgori = ["ვარკეთილი","ვაზისუბანი","სამგორი","აფრიკა","Varketili","Vazisubani","Samgori","Africa","Варкетили","Вазисубани","Самгори","Африка"];
            const ponichala = ["ფონიჭალა","Ponichala","Поничала"];
            const lilo = ["ლილო","Lilo","Лило"];
            const dighomi = ["დიდი დიღომი","დიღმის მასივი","ვაშლიჯვარი","Didi Dighomi","Dighomi Masivi","Vashlijvari","Диди Дигоми","Дигомский массив","Вашлиджвари"];
            if (inGrp(a,ponichala)||inGrp(b,ponichala)) {
                if (inGrp(a,ortachala_isani)||inGrp(b,ortachala_isani)) return 70;
                if (inGrp(a,varketili_samgori)||inGrp(b,varketili_samgori)) return 70;
                return 80;
            }
            if (inGrp(a,lilo)||inGrp(b,lilo)) {
                if (inGrp(a,varketili_samgori)||inGrp(b,varketili_samgori)) return 60;
                if (inGrp(a,zahesi)||inGrp(b,zahesi)||inGrp(a,saburtalo_vake)||inGrp(b,saburtalo_vake)||inGrp(a,dighomi)||inGrp(b,dighomi)) return 80;
                return 70;
            }
            if (has(zahesi,saburtalo_vake)) return 70;
            if (has(zahesi,ortachala_isani)) return 70;
            if (has(zahesi,varketili_samgori)) return 70;
            if (has(saburtalo_vake,ortachala_isani)) return 70;
            if (has(saburtalo_vake,varketili_samgori)) return 70;
            if (has(gldani,varketili_samgori)) return 70;
            if (has(dighomi,ortachala_isani)) return 70;
            if (has(dighomi,varketili_samgori)) return 70;
            if (has(mukhiani,varketili_samgori)) return 60;
            if (has(sea,varketili_samgori)) return 60;
            if (has(zahesi,didube_eliava)) return 60;
            if (has(zahesi,gldani)||has(zahesi,mukhiani)) return 60;
            if (has(center,ortachala_isani)) return 60;
            if (has(center,saburtalo_vake)) return 60;
            if (has(center,varketili_samgori)) return 60;
            return 60;
        }

        function updateFinalPrice() {
            const start = csState['cs-start'] ? csState['cs-start'].value : '';
            const end = csState['cs-end'] ? csState['cs-end'].value : '';
            let price = calculateLogicalPrice(start, end);
            if (cityType === 'heavy') price += 20;
            const el = document.getElementById('cityPrice');
            el.style.transform = 'scale(1.18)';
            el.innerText = price;
            setTimeout(() => el.style.transform = 'scale(1)', 250);
        }

        function setCityType(type) {
            cityType = type;
            document.getElementById('city-light').classList.toggle('active', type === 'light');
            document.getElementById('city-heavy').classList.toggle('active', type === 'heavy');
            const t = translations[currentLang];
            document.getElementById('cityTypeLabel').innerText = type === 'light' ? t.btnLight : t.btnHeavy + ' (+20₾)';
            buildDistrictCS('cs-end', t.districts, null, () => updateFinalPrice());
            updateFinalPrice();
        }

        function showTab(type) {
            document.querySelectorAll('.calc-card,.tab-btn').forEach(el => el.classList.remove('active'));
            if (type === 'city') {
                document.getElementById('cityCalc').classList.add('active');
                document.getElementById('tab-city').classList.add('active');
            } else {
                document.getElementById('countryCalc').classList.add('active');
                document.getElementById('tab-country').classList.add('active');
            }
        }

        function setCountryType(type) {
            countryType = type;
            document.getElementById('country-light').classList.toggle('active', type === 'light');
            document.getElementById('country-heavy').classList.toggle('active', type === 'heavy');
            const t = translations[currentLang];
            document.getElementById('countryTypeLabel').innerText = type === 'light' ? t.btnLight + ' — 1.5 ₾/km' : t.btnHeavy + ' — 2.0 ₾/km';
            buildCityCS('cs-inter', t.cities, t.other);
            calculateCountry();
        }

        function calculateCountry() {
            const st = csState['cs-inter'];
            const kmBlock = document.getElementById('kmInputBlock');
            let price = 0;
            if (!st || st.value === 'custom') {
                kmBlock.style.display = 'block';
                const km = document.getElementById('kmValue').value || 0;
                price = 50 + (km * (countryType === 'light' ? 1.5 : 2.0));
            } else {
                kmBlock.style.display = 'none';
                price = countryType === 'light' ? st.data.v : st.data.h;
            }
            const el = document.getElementById('countryPrice');
            el.style.transform = 'scale(1.18)';
            el.innerText = Math.round(price);
            setTimeout(() => el.style.transform = 'scale(1)', 250);
        }

        function sendWA(mode) {
            const t = translations[currentLang];
            let msg = '';
            if (mode === 'city') {
                const start = csState['cs-start'] ? csState['cs-start'].value : '';
                const end = csState['cs-end'] ? csState['cs-end'].value : '';
                const price = document.getElementById('cityPrice').innerText;
                const type = cityType === 'light' ? t.btnLight : t.btnHeavy;
                msg = `${t.waGreeting} (${type})%0A${t.waFrom}: ${start}%0A${t.waTo}: ${end}%0A${t.waPrice}: ${price} ${t.waCurrency}`;
            } else {
                const dest = csState['cs-inter'] ? csState['cs-inter'].label : '';
                const price = document.getElementById('countryPrice').innerText;
                const type = countryType === 'light' ? t.btnLight : t.btnHeavy;
                msg = `${t.waGreeting} (${type})%0A${t.waDir}: ${dest}%0A${t.waPrice}: ${price} ${t.waCurrency}`;
            }
            window.open(`https://wa.me/995568417682?text=${msg}`, '_blank');
        }

        function toggleDark() {
            const isLight = document.body.classList.toggle('light');
            document.getElementById('darkBtn').textContent = isLight ? '🌙' : '☀️';
            localStorage.setItem('lightMode', isLight);
        }
        if (localStorage.getItem('lightMode') === 'true') {
            document.body.classList.add('light');
            document.getElementById('darkBtn').textContent = '🌙';
        }

        setLang('ka');
    </script>
